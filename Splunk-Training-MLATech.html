<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLATech | Splunk Zero to Hero - Premium 2026</title>
  
  <!-- CDNs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* Premium Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; border: 2px solid #020617; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    body { 
      overflow: hidden; 
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #020617;
    }
    
    /* Animations */
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Premium Glassmorphism */
    .glass-panel {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }
    .glass-panel:hover {
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.5);
    }
    
    .glass-sidebar {
      background: rgba(2, 6, 23, 0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Subtle Animated Background Grid */
    .bg-grid-pattern {
      background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+CjxwYXRoIGQ9Ik0wIDBoNDB2NDBIMHoiIGZpbGw9Im5vbmUiLz4KPHBhdGggZD0iTTAgMTBoNDBNMTAgMHY0ME0wIDIwaDQwTTIwIDB2NDBNMCAzMGg0ME0zMCAwdjQwIiBzdHJva2U9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiIHN0cm9rZS13aWR0aD0iMSIvPgo8L3N2Zz4=");
    }

    .mlatech-main-scroll { scroll-behavior: smooth; }
    .mlatech-content > * + * { margin-top: 2rem; }
    .mlatech-card-stack > * + * { margin-top: 1.25rem; }
    
    .font-code { font-family: 'JetBrains Mono', monospace; }

  </style>
</head>
<body class="bg-[#020617] text-slate-300 antialiased selection:bg-blue-500 selection:text-white">
  <!-- Global Background Decorations -->
  <div class="fixed inset-0 z-[-2] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#020617] to-black"></div>
  <div class="fixed inset-0 z-[-1] bg-grid-pattern opacity-60 pointer-events-none"></div>
  <div class="fixed top-[-20%] right-[-10%] w-[800px] h-[800px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="fixed bottom-[-20%] left-[-10%] w-[800px] h-[800px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const externalLinkProps = {
      target: "_blank",
      rel: "noopener noreferrer"
    };

    /* Premium Code Block */
    const CodeBlock = ({ code = "", language = "spl" }) => {
      const [copied, setCopied] = React.useState(false);
      const timeoutRef = React.useRef(null);

      React.useEffect(() => {
        return () => {
          if (timeoutRef.current) clearTimeout(timeoutRef.current);
        };
      }, []);

      const copyToClipboard = async () => {
        try {
          if (
            navigator.clipboard &&
            window.isSecureContext
          ) {
            await navigator.clipboard.writeText(code);
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = code;
            textArea.setAttribute("readonly", "");
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            textArea.setSelectionRange(0, textArea.value.length);

            const success = document.execCommand("copy");
            document.body.removeChild(textArea);

            if (!success) throw new Error("Copy failed");
          }

          setCopied(true);
          if (timeoutRef.current) clearTimeout(timeoutRef.current);
          timeoutRef.current = setTimeout(() => setCopied(false), 2000);
        } catch {
          alert("Copy failed. Please copy manually.");
        }
      };

      const tokenizeSpl = (text) => {
        const rules = [
          { regex: /^\|/, className: "text-pink-500 font-bold" },
          {
            regex: /^(index|sourcetype|source|host|earliest|latest)\b/,
            className: "text-blue-400 font-semibold",
          },
          {
            regex: /^(stats|table|sort|head|tail|top|rare|dedup|rename|fields|where|eval|timechart|search|rex|transaction)\b/,
            className: "text-purple-400 font-semibold",
          },
          {
            regex: /^"[^"]*"/,
            className: "text-orange-400",
          },
          {
            regex: /^(count|dc|sum|avg|max|min)\b/,
            className: "text-emerald-400",
          },
          {
            regex: /^(OR|AND|NOT|by|as)\b/,
            className: "text-yellow-300 font-bold",
          },
        ];

        const tokens = [];
        let remaining = text;
        let key = 0;

        while (remaining.length > 0) {
          let matched = false;

          for (const rule of rules) {
            const match = remaining.match(rule.regex);
            if (match) {
              tokens.push(
                <span key={key++} className={rule.className}>
                  {match[0]}
                </span>
              );
              remaining = remaining.slice(match[0].length);
              matched = true;
              break;
            }
          }

          if (!matched) {
            tokens.push(
              <span key={key++}>{remaining[0]}</span>
            );
            remaining = remaining.slice(1);
          }
        }

        return tokens;
      };

      const renderedCode =
        language === "spl" ? tokenizeSpl(code) : code;

      return (
        <div className="relative bg-[#0d1117] rounded-xl my-5 border border-slate-700/60 shadow-[0_8px_30px_rgb(0,0,0,0.4)] group overflow-hidden transition-all duration-300 hover:border-slate-600">
          <div className="flex items-center justify-between px-4 py-2.5 bg-[#161b22] border-b border-slate-700/60">
            <div className="flex space-x-2">
              <div className="w-3 h-3 rounded-full bg-red-500/90 shadow-inner"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500/90 shadow-inner"></div>
              <div className="w-3 h-3 rounded-full bg-green-500/90 shadow-inner"></div>
            </div>
            <span className="text-xs font-mono text-slate-500 uppercase tracking-wider">
              {language?.toLowerCase() === "spl" ? "SPL" : "BASH"}
            </span>
          </div>

          <div className="p-5 overflow-x-auto">
            <pre className="m-0 whitespace-pre-wrap break-words leading-relaxed font-mono text-[13px] md:text-sm text-emerald-400">
              <code>
                {renderedCode}
              </code>
            </pre>
          </div>

          <button
            type="button"
            onClick={copyToClipboard}
            className={`absolute top-12 right-3 p-2 rounded-lg border backdrop-blur-sm transition-all duration-300 flex items-center justify-center ${
              copied
                ? "bg-green-500/20 border-green-500/50 text-green-400"
                : "bg-slate-800/80 border-slate-600 text-slate-400 hover:bg-slate-700 hover:text-white opacity-0 md:group-hover:opacity-100"
            }`}
            title="Copy to clipboard"
          >
            <i className={copied ? "fas fa-check" : "fas fa-copy"}></i>
          </button>
        </div>
      );
    };

    /* Premium Accordion */
    const Accordion = ({ title, icon, children }) => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className={`rounded-xl mb-4 overflow-hidden transition-all duration-300 border ${isOpen ? 'bg-slate-800/40 border-blue-500/30 shadow-lg' : 'bg-slate-900/40 border-slate-700/50 hover:border-slate-600 shadow-sm'}`}>
          <button onClick={() => setIsOpen(!isOpen)} className="w-full px-5 py-4 flex justify-between items-center text-left focus:outline-none group">
            <span className={`font-semibold text-lg flex items-center transition-colors ${isOpen ? 'text-blue-300' : 'text-slate-200 group-hover:text-white'}`}>
              <i className={`${icon} w-8 text-center text-xl mr-2 ${isOpen ? 'text-blue-400 drop-shadow-[0_0_8px_rgba(96,165,250,0.5)]' : 'text-slate-400 group-hover:text-blue-400 transition-colors'}`}></i>
              {title}
            </span>
            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all ${isOpen ? 'bg-blue-500/20 text-blue-400' : 'bg-slate-800 text-slate-400 group-hover:bg-slate-700 group-hover:text-white'}`}>
              <i className={`fas fa-chevron-down transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}></i>
            </div>
          </button>
          {isOpen && <div className="p-6 border-t border-slate-700/50 text-slate-300 bg-black/20 fade-in leading-relaxed text-[15px]">{children}</div>}
        </div>
      );
    };

    /* Premium Tabs */
    const Tabs = ({ tabs }) => {
      const [active, setActive] = useState(0);
      return (
        <div className="glass-panel rounded-2xl overflow-hidden my-6 shadow-xl">
          <div className="flex flex-wrap border-b border-slate-700/60 bg-slate-900/80">
            {tabs.map((tab, i) => (
              <button
                key={i}
                onClick={() => setActive(i)}
                className={`flex-1 min-w-[140px] px-4 py-3.5 text-sm font-semibold transition-all duration-300 relative ${active === i ? 'text-blue-300 bg-blue-900/10' : 'text-slate-400 hover:bg-slate-800/80 hover:text-slate-200'}`}
              >
                {tab.title}
                {active === i && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.8)]"></div>}
              </button>
            ))}
          </div>
          <div className="p-6 fade-in">{tabs[active].content}</div>
        </div>
      );
    };

    /* Premium Quiz */
    const Quiz = ({ question, options, answerIndex, explanation }) => {
      const [selected, setSelected] = useState(null);
      const [showExplanation, setShowExplanation] = useState(false);

      const resetQuiz = () => {
        setSelected(null);
        setShowExplanation(false);
      };

      return (
        <div className="glass-panel p-6 md:p-8 rounded-3xl my-12 border-l-4 border-l-blue-500 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
          
          <div className="flex items-center justify-between gap-4 mb-6 flex-wrap relative z-10">
            <h4 className="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 flex items-center">
              <i className="fas fa-brain mr-3 text-2xl text-blue-400"></i> Knowledge Check
            </h4>
            <button
              onClick={resetQuiz}
              className="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 text-sm font-semibold transition-all hover:shadow-lg"
            >
              <i className="fas fa-rotate-left mr-2"></i>Reset
            </button>
          </div>
          
          <p className="mb-6 text-white text-xl font-medium leading-relaxed relative z-10">{question}</p>
          
          <div className="space-y-3 relative z-10">
            {options.map((opt, i) => {
              const isSelected = selected === i;
              const isCorrect = i === answerIndex;
              let classes = 'bg-slate-800/80 border-slate-700 hover:bg-slate-700 hover:border-blue-500 text-slate-300 hover:shadow-lg hover:-translate-y-0.5';
              if (selected !== null) {
                if (isCorrect) classes = 'bg-green-900/40 border-green-500 text-green-100 shadow-[0_0_15px_rgba(34,197,94,0.15)]';
                else if (isSelected) classes = 'bg-red-900/40 border-red-500 text-red-100';
                else classes = 'bg-slate-900/50 border-slate-800 text-slate-500 opacity-50';
              }
              return (
                <button
                  key={i}
                  onClick={() => { if (selected === null) { setSelected(i); setShowExplanation(true); } }}
                  className={`w-full text-left p-5 rounded-xl transition-all duration-200 font-medium border ${classes}`}
                  disabled={selected !== null}
                >
                  <div className="flex justify-between items-center gap-4">
                    <span className="text-base">{opt}</span>
                    {selected !== null && isCorrect && <i className="fas fa-check-circle text-green-400 text-xl"></i>}
                    {selected !== null && isSelected && !isCorrect && <i className="fas fa-times-circle text-red-400 text-xl"></i>}
                  </div>
                </button>
              );
            })}
          </div>
          
          {showExplanation && (
            <div className="mt-8 p-5 bg-slate-900/80 rounded-2xl border border-slate-700 fade-in flex items-start gap-4">
              <div className="w-10 h-10 rounded-full bg-blue-500/20 flex flex-shrink-0 items-center justify-center border border-blue-500/30">
                <i className="fas fa-lightbulb text-blue-400"></i>
              </div>
              <div>
                <p className="text-sm leading-relaxed mb-1"><span className="font-bold text-green-400 uppercase tracking-wide text-xs">Correct answer</span></p>
                <p className="text-white font-medium mb-3">{options[answerIndex]}</p>
                <div className="h-px w-full bg-slate-700/50 mb-3"></div>
                <p className="text-sm text-slate-300 leading-relaxed"><span className="font-bold text-blue-300">Why:</span> {explanation}</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    /* Premium Headers */
    const SectionHeader = ({ title, icon }) => (
      <div className="mb-10 fade-in">
        <h2 className="text-3xl md:text-4xl font-black text-white flex items-center tracking-tight">
          <div className="bg-gradient-to-br from-blue-500/20 to-blue-600/10 w-14 h-14 flex items-center justify-center rounded-2xl mr-5 border border-blue-500/30 shadow-[inset_0_0_20px_rgba(59,130,246,0.2)]">
            <i className={`${icon} text-blue-400 text-2xl drop-shadow-[0_0_8px_rgba(96,165,250,0.8)]`}></i>
          </div>
          {title}
        </h2>
        <div className="h-px w-full bg-gradient-to-r from-slate-700 via-slate-700/50 to-transparent mt-6"></div>
      </div>
    );

    const SubHeader = ({ title }) => (
      <h3 className="text-2xl font-bold mt-12 mb-6 text-white flex items-center tracking-tight fade-in">
        <div className="w-1.5 h-6 bg-blue-500 rounded-full mr-3 shadow-[0_0_10px_rgba(59,130,246,0.6)]"></div>
        {title}
      </h3>
    );

    /* Premium Info Card */
    const InfoCard = ({ icon, title, children, tone = 'blue' }) => {
      const tones = {
        blue: 'border-blue-500/30 bg-blue-900/10 text-blue-200 hover:border-blue-500/50 hover:shadow-[0_8px_30px_rgba(59,130,246,0.15)]',
        yellow: 'border-yellow-500/30 bg-yellow-900/10 text-yellow-200 hover:border-yellow-500/50 hover:shadow-[0_8px_30px_rgba(234,179,8,0.15)]',
        red: 'border-red-500/30 bg-red-900/10 text-red-200 hover:border-red-500/50 hover:shadow-[0_8px_30px_rgba(239,68,68,0.15)]',
        green: 'border-emerald-500/30 bg-emerald-900/10 text-emerald-200 hover:border-emerald-500/50 hover:shadow-[0_8px_30px_rgba(16,185,129,0.15)]',
        purple: 'border-purple-500/30 bg-purple-900/10 text-purple-200 hover:border-purple-500/50 hover:shadow-[0_8px_30px_rgba(168,85,247,0.15)]'
      };
      
      const iconTones = {
        blue: 'text-blue-400 bg-blue-500/10',
        yellow: 'text-yellow-400 bg-yellow-500/10',
        red: 'text-red-400 bg-red-500/10',
        green: 'text-emerald-400 bg-emerald-500/10',
        purple: 'text-purple-400 bg-purple-500/10'
      };

      return (
        <div className={`border rounded-2xl p-6 my-6 transition-all duration-300 hover:-translate-y-1 ${tones[tone]}`}>
          <div className="flex items-start gap-5">
            <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${iconTones[tone]}`}>
              <i className={`${icon} text-xl drop-shadow-md`}></i>
            </div>
            <div>
              <h4 className="font-bold text-white mb-2 text-lg tracking-tight">{title}</h4>
              <div className="text-[15px] leading-relaxed opacity-90">{children}</div>
            </div>
          </div>
        </div>
      );
    };

    /* Premium Step Card */
    const StepCard = ({ step, icon, title, children }) => (
      <div className="glass-panel rounded-2xl p-6 border-l-4 border-l-blue-500 my-5 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
        <div className="flex items-start gap-5">
          <div className="w-14 h-14 rounded-xl bg-gradient-to-br from-blue-600/30 to-blue-900/30 border border-blue-500/30 flex items-center justify-center shrink-0 shadow-inner relative overflow-hidden">
            <div className="absolute inset-0 bg-blue-400/10"></div>
            <i className={`${icon} text-blue-300 text-xl drop-shadow-md relative z-10`}></i>
          </div>
          <div className="min-w-0 flex-1">
            <div className="inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest bg-blue-900/50 text-blue-300 border border-blue-500/20 mb-2">Step {step}</div>
            <h4 className="text-xl font-bold text-white mb-2 tracking-tight">{title}</h4>
            <div className="text-slate-300 text-[15px] leading-relaxed">{children}</div>
          </div>
        </div>
      </div>
    );

    /* Premium SPL Command Card */
    const SplCommandCard = ({ num, title, purpose, command, explanation, beginnerTip }) => (
      <div className="glass-panel p-6 md:p-8 rounded-2xl border-t-4 border-t-blue-500">
        <div className="flex items-center gap-4 mb-5">
          <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-400 text-slate-900 font-black flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.4)]">{num}</div>
          <div>
            <h4 className="text-xl font-bold text-white">{title}</h4>
            <p className="text-sm text-cyan-300 font-medium mt-1">Purpose: {purpose}</p>
          </div>
        </div>
        
        <CodeBlock code={command} />
        
        <div className="mt-5 space-y-4">
          <div className="flex gap-3">
            <i className="fas fa-microscope text-slate-400 mt-1"></i>
            <p className="text-sm text-slate-300 leading-relaxed"><strong className="text-white">What it does:</strong> {explanation}</p>
          </div>
          <div className="flex gap-3 bg-yellow-900/10 p-4 rounded-xl border border-yellow-500/20">
            <i className="fas fa-star text-yellow-500 mt-0.5"></i>
            <p className="text-sm text-yellow-200 leading-relaxed"><strong className="text-yellow-400">Beginner tip:</strong> {beginnerTip}</p>
          </div>
        </div>
      </div>
    );

    /* Premium Lab Card */
    const LabCard = ({ title, color, icon, scenario, attackerGoal, analystGoal, downloadLabFiles, setup, attack, recognize, commands, warning }) => {
      // Map Tailwind border colors to hex/rgba for glowing shadows if needed, or just use the border utility
      return (
        <div className={`glass-panel p-6 md:p-8 rounded-3xl ${color} border-t-4 mb-10 overflow-hidden relative group`}>
          <h3 className="text-3xl font-extrabold text-white mb-4 tracking-tight">{title}</h3>
          <p className="text-slate-300 leading-relaxed mb-8 text-lg bg-slate-900/40 p-4 rounded-xl border border-slate-700/50">{scenario}</p>
          
          <div className="grid xl:grid-cols-2 gap-6 mb-8">
            <div className="bg-[#1a0e14] border border-red-900/50 rounded-2xl p-5 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-20 h-20 bg-red-500/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
              <h4 className="text-red-400 font-bold mb-3 flex items-center text-lg"><i className="fas fa-crosshairs mr-3 text-xl"></i>Attacker Goal</h4>
              <p className="text-slate-300 leading-relaxed">{attackerGoal}</p>
            </div>
            <div className="bg-[#0e1624] border border-blue-900/50 rounded-2xl p-5 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-20 h-20 bg-blue-500/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
              <h4 className="text-blue-400 font-bold mb-3 flex items-center text-lg"><i className="fas fa-shield-halved mr-3 text-xl"></i>Analyst Goal</h4>
              <p className="text-slate-300 leading-relaxed">{analystGoal}</p>
            </div>
          </div>
          
          <div className="space-y-8">
            {downloadLabFiles && (<div>
              <h4 className="text-white font-bold mb-4 text-xl flex items-center"><i className="fas fa-download text-slate-400 mr-3"></i>Download Lab Files</h4>
              {downloadLabFiles}
            </div>)}

            <div>
              <h4 className="text-white font-bold mb-4 text-xl flex items-center"><i className="fas fa-screwdriver-wrench text-slate-400 mr-3"></i>Step-by-step setup</h4>
              <div className="text-slate-300 leading-relaxed bg-slate-900/50 p-5 rounded-2xl border border-slate-700/50">{setup}</div>
            </div>
            
            <div>
              <h4 className="text-white font-bold mb-4 text-xl flex items-center"><i className="fas fa-terminal text-red-400 mr-3"></i>Attack commands</h4>
              {attack}
            </div>
            
            <div>
              <h4 className="text-white font-bold mb-4 text-xl flex items-center"><i className="fas fa-eye text-yellow-400 mr-3"></i>Patterns to recognize</h4>
              <div className="text-slate-300 leading-relaxed bg-yellow-900/10 p-5 rounded-2xl border border-yellow-700/30">{recognize}</div>
            </div>
            
            <div>
              <h4 className="text-white font-bold mb-4 text-xl flex items-center"><i className="fas fa-magnifying-glass text-green-400 mr-3"></i>Searches to run</h4>
              <div className="space-y-2">{commands}</div>
            </div>
            
            {warning && <InfoCard icon="fas fa-triangle-exclamation" title="Important reality check" tone="yellow">{warning}</InfoCard>}

                      <Accordion title="FTP Parsing Troubleshooting" icon="fas fa-info-circle">

                          <li><strong>Missing Logs:</strong> If you don't see FTP logs, verify Metasploitable is sending <code>vsftpd</code> logs to syslog. Check <code>/etc/vsftpd.conf</code> on the target.</li>
                          <li><strong>Standardization:</strong> Notice we use <code>src_ip</code> for both. This allows us to build a single dashboard that tracks attackers across ALL services.</li>
                        </ul>
                      </Accordion>
                    </div>
                  </div>

                  {/* Section 3: UI-Based Permanent Saving */}
                  <div className="glass-panel p-8 rounded-3xl border border-slate-700 bg-slate-900/20 relative">
                    <div className="flex items-center mb-6">
                      <div className="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center mr-4">
                        <i className="fas fa-save text-green-400 text-xl"></i>
                      </div>
                      <SubHeader title="3. Making Fields Permanent" />
                    </div>
                    <p className="text-slate-300 mb-6 text-lg">Typing <code>rex</code> every time is inefficient. Follow these steps to save the fields in the Splunk UI.</p>
                    <div className="space-y-4 mb-8">
                      <ol className="text-base text-slate-300 space-y-2 list-decimal pl-5">
                        <li>Run: <code className="font-code text-blue-300 bg-blue-900/30 px-1 rounded">index=lab_data (sshd OR vsftpd)</code></li>
                        <li>Expand any "Failed" event &gt; <strong>Event Actions &gt; Extract Fields</strong>.</li>
                        <li>Select <strong>Regular Expression</strong> and highlight the IP.</li>
                        <li>Name it <code className="text-green-400">src_ip</code> and click Save.</li>
                        <li>Repeat for the username and name it <code className="text-green-400">user_attempted</code>.</li>
                      </ol>
                    </div>

                    <Accordion title="Extraction Cleanup & Optimization" icon="fas fa-broom">
                      <p className="text-slate-300 mb-4">Messed up? To delete or edit saved fields:</p>
                      <ol className="list-decimal pl-6 space-y-2 text-sm text-slate-300">
                        <li>Navigate to <strong>Settings &gt; Fields &gt; Field extractions</strong>.</li>
                        <li>Filter by your index name or field name (e.g., <code>src_ip</code>).</li>
                        <li>Click <strong>Delete</strong> to reset the logic and try again.</li>
                      </ol>
                    </Accordion>
                  </div>
                </div>
              )}

              {/* --- TAB 8: ADVANCED ALERTS --- */}
              {activeTab === 8 && (
                  <div className="fade-in space-y-12">
                    <div className="mb-6">
                      <SectionHeader title="Phase 2: Alerting & Testing" icon="fas fa-bell" />
                      <p className="text-xl text-slate-300 leading-relaxed font-light">
                        Detections are automated guardians. In this lab, you will build three different alerts and perform the attacks from Kali to verify that your "SOC" can catch the threat in real-time.
                      </p>
                    </div>

                    {/* Alert 1: Brute Force */}
                    <div className="glass-panel p-8 rounded-3xl border border-slate-700 bg-slate-900/20 relative">
                      <div className="flex justify-between items-center mb-6">
                        <h4 className="text-white font-bold text-2xl italic flex items-center">
                          <i className="fas fa-bolt text-yellow-400 mr-3"></i> 1. High-Volume Brute Force
                        </h4>
                        <span className="text-[10px] text-yellow-500 font-bold border border-yellow-500/30 px-2 py-1 rounded-md uppercase">Severity: Med</span>
                      </div>
                      <CodeBlock language="SPL" code={`index=lab_data (sshd "Failed" OR vsftpd "failure")\n| stats count by src_ip, user_attempted\n| where count > 10`} />
                      <p className="text-slate-400 text-sm mt-4 mb-6 italic">Save as Alert &gt; Real-Time &gt; Throttle by src_ip (1 min).</p>
                      
                      <Accordion title="How to Test & Verify" icon="fas fa-flask">
                        <p className="text-slate-300 mb-4 font-bold">Attack Command (Kali):</p>
                        <CodeBlock code={`hydra -l msfadmin -P common-ssh-passwords.txt 192.168.56.101 ssh -t 4`} />
                        <p className="text-slate-400 text-sm mt-4">Check <strong>Activity &gt; Triggered Alerts</strong>. If it fired, you successfully detected a brute force attempt.</p>
                      </Accordion>
                    </div>

                    {/* Alert 2: Success After Failure */}
                    <div className="glass-panel p-8 rounded-3xl border border-slate-700 bg-slate-900/20 relative">
                      <div className="flex justify-between items-center mb-6">
                        <h4 className="text-white font-bold text-2xl italic flex items-center">
                          <i className="fas fa-door-open text-red-400 mr-3"></i> 2. The Breach Detection
                        </h4>
                        <span className="text-[10px] text-red-500 font-bold border border-red-500/30 px-2 py-1 rounded-md uppercase">Severity: Critical</span>
                      </div>
                      <CodeBlock language="SPL" code={`index=lab_data (sshd OR vsftpd) ("Failed" OR "Accepted" OR "OK LOGIN")\n| transaction src_ip maxspan=5m\n| search ("Failed" OR "failure") AND ("Accepted" OR "OK LOGIN")`} />
                      <p className="text-slate-400 text-sm mt-4 mb-6 italic">This alert triggers only when an attacker finally guesses the right password.</p>
                      
                      <Accordion title="The 'Scenario' Test" icon="fas fa-flask">
                        <ol className="list-decimal pl-6 space-y-3 text-sm text-slate-300">
                          <li>Run Hydra with a small, incorrect password list to generate failures.</li>
                          <li>Immediately after, log in manually with the correct credentials: <code className="text-blue-300">ssh msfadmin@192.168.56.101</code>.</li>
                          <li>Wait for the <strong>transaction</strong> to group them and fire the Critical alert.</li>
                        </ol>
                      </Accordion>
                    </div>

                    {/* Alert 3: Root Account Targeting */}
                    <div className="glass-panel p-8 rounded-3xl border border-slate-700 bg-slate-900/20 relative">
                      <div className="flex justify-between items-center mb-6">
                        <h4 className="text-white font-bold text-2xl italic flex items-center">
                          <i className="fas fa-user-shield text-blue-400 mr-3"></i> 3. Root Targeting Detection
                        </h4>
                        <span className="text-[10px] text-blue-500 font-bold border border-blue-500/30 px-2 py-1 rounded-md uppercase">Severity: High</span>
                      </div>
                      <CodeBlock language="SPL" code={`index=lab_data (sshd OR vsftpd) user_attempted="root"\n| stats count by src_ip, sourcetype\n| where count >= 1`} />
                      <p className="text-slate-400 text-sm mt-4 mb-6 italic">In secure environments, root should never be targeted. We alert on a single attempt.</p>
                      
                      <Accordion title="The Single-Hit Test" icon="fas fa-flask">
                        <p className="text-slate-300 mb-4 font-bold">Attack Command (Kali):</p>
                        <CodeBlock code={`hydra -l root -p simplepassword 192.168.56.101 ftp`} />
                        <p className="text-slate-400 text-sm mt-4">Even one failure from Hydra will trigger this alert because the user is "root".</p>
                      </Accordion>
                    </div>

                    {/* Cleanup Footer */}
                    <div className="pt-8 border-t border-slate-800">
                      <Accordion title="Lab Cleanup: Removing Background Noise" icon="fas fa-trash-alt">
                        <p className="text-slate-300 text-sm mb-4">When you are finished with this lab, you must disable or delete your alerts to keep your Splunk Enterprise instance performant:</p>
                        <ol className="list-decimal pl-6 space-y-2 text-xs text-slate-400 italic">
                          <li>Go to <strong>Settings &gt; Searches, Reports, and Alerts</strong>.</li>
                          <li>Find the alerts you created and select <strong>Edit &gt; Delete</strong>.</li>
                        </ol>
                      </Accordion>
                    </div>
                  </div>
                )}

              {/* --- TAB 9: DASHBOARDS --- */}
              {activeTab === 9 && (
                <div className="fade-in">
                  <SectionHeader title="Dashboards & Visualizations" icon="fas fa-chart-pie" />
                  <p className="mb-8 text-xl text-slate-300 leading-relaxed font-light">
                    This section transforms raw technical data into a visual story. Each panel below helps you track the 2026 Kali attack in real-time. Use <strong>Option A</strong> if you saved your fields in Tab 7, or <strong>Option B</strong> to extract them on the fly.
                  </p>

                  <SubHeader title="Dashboard design rule for beginners" />
                  <InfoCard icon="fas fa-table-columns" title="Build from working searches only" tone="green">
                    Never build a dashboard first and hope it works later. First make a search work in <strong>Search & Reporting</strong>. Once you see the statistics you want in the table below the search bar, only then turn that working search into a panel.
                  </InfoCard>

                  <div className="space-y-8 mb-12 mt-8">
                    {/* Panel 1: Attack Trend */}
                    <div className="glass-panel p-6 md:p-8 rounded-3xl border border-slate-700 relative overflow-hidden group">
                      <div className="absolute top-0 right-0 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-colors"></div>
                      <h4 className="font-extrabold text-white text-xl mb-4 relative z-10 flex items-center">
                        <i className="fas fa-chart-line text-blue-400 mr-3 text-2xl"></i>Panel 1: Global Attack Trend (Over Time)
                      </h4>
                      <div className="relative z-10 space-y-4">
                        <div>
                          <p className="text-xs text-green-400 font-bold uppercase mb-1">Option A (Permanent Fields):</p>
                          <CodeBlock code={`index=lab_data (sshd "Failed" OR vsftpd "failure")\n| timechart count by sourcetype`} />
                        </div>
                        <div>
                          <p className="text-xs text-yellow-400 font-bold uppercase mb-1">Option B (Inline Extraction):</p>
                          <CodeBlock code={`index=lab_data (sshd "Failed" OR vsftpd "failure")\n| rex "from (?<src_ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"\n| rex "rhost=(?<src_ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"\n| timechart count by sourcetype`} />
                        </div>
                      </div>
                      <div className="text-base text-slate-400 mt-4 leading-relaxed relative z-10 bg-slate-900/40 p-4 rounded-xl space-y-2">
                        <p><strong>What to expect:</strong> This panel generates a line or area chart. As you run Hydra, you will see a sudden "spike" in the graph, showing exactly when the attack intensified.</p>
                        <p className="text-sm italic border-t border-slate-800 pt-2 text-slate-500">Requirement: Ensure you have launched a brute force attack within the selected time range.</p>
                      </div>
                    </div>

                    {/* Panel 2: Usernames */}
                    <div className="glass-panel p-6 md:p-8 rounded-3xl border border-slate-700 relative overflow-hidden group">
                      <div className="absolute top-0 right-0 w-24 h-24 bg-orange-500/10 rounded-full blur-2xl group-hover:bg-orange-500/20 transition-colors"></div>
                      <h4 className="font-extrabold text-white text-xl mb-4 relative z-10 flex items-center">
                        <i className="fas fa-users text-orange-400 mr-3 text-2xl"></i>Panel 2: Top Attempted Usernames
                      </h4>
                      <div className="relative z-10 space-y-4">
                        <div>
                          <p className="text-xs text-green-400 font-bold uppercase mb-1">Option A (Permanent Fields):</p>
                          <CodeBlock code={`index=lab_data (sshd OR vsftpd) ("Failed" OR "failure")\n| stats count by user_attempted\n| sort - count\n| head 10`} />
                        </div>
                        <div>
                          <p className="text-xs text-yellow-400 font-bold uppercase mb-1">Option B (Inline Extraction):</p>
                          <CodeBlock code={`index=lab_data (sshd OR vsftpd) ("Failed" OR "failure")\n| rex "for (invalid user )?(?<user_attempted>\\S+) from"\n| rex "ruser=(?<user_attempted>\\S+)"\n| stats count by user_attempted\n| sort - count\n| head 10`} />
                        </div>
                      </div>
                      <div className="text-base text-slate-400 mt-4 leading-relaxed relative z-10 bg-slate-900/40 p-4 rounded-xl space-y-2">
                        <p><strong>What to expect:</strong> A bar chart or table listing usernames like <code>admin</code>, <code>root</code>, and <code>msfadmin</code>. This reveals the specific dictionary list the attacker is using.</p>
                        <p className="text-sm italic border-t border-slate-800 pt-2 text-slate-500">Requirement: The field 'user_attempted' must be extracted correctly to see values here.</p>
                      </div>
                    </div>

                    {/* Panel 3: Root Targeting */}
                    <div className="glass-panel p-6 md:p-8 rounded-3xl border border-slate-700 relative overflow-hidden group">
                      <div className="absolute top-0 right-0 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl group-hover:bg-purple-500/20 transition-colors"></div>
                      <h4 className="font-extrabold text-white text-xl mb-4 relative z-10 flex items-center">
                        <i className="fas fa-user-shield text-purple-400 mr-3 text-2xl"></i>Panel 3: Root Account Targeting
                      </h4>
                      <div className="relative z-10 space-y-4">
                        <div>
                          <p className="text-xs text-green-400 font-bold uppercase mb-1">Option A (Permanent Fields):</p>
                          <CodeBlock code={`index=lab_data (sshd OR vsftpd) user_attempted="root" ("Failed" OR "failure")\n| stats count by src_ip\n| sort - count`} />
                        </div>
                        <div>
                          <p className="text-xs text-yellow-400 font-bold uppercase mb-1">Option B (Inline Extraction):</p>
                          <CodeBlock code={`index=lab_data (sshd OR vsftpd) "root" ("Failed" OR "failure")\n| rex "from (?<src_ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"\n| rex "rhost=(?<src_ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"\n| stats count by src_ip\n| sort - count`} />
                        </div>
                      </div>
                      <div className="text-base text-slate-400 mt-4 leading-relaxed relative z-10 bg-slate-900/40 p-4 rounded-xl space-y-2">
                        <p><strong>What to expect:</strong> A single-value panel or table showing only attempts against the <code>root</code> user. Even a count of 1 is a critical security event.</p>
                        <p className="text-sm italic border-t border-slate-800 pt-2 text-slate-500">Requirement: At least one attempt against 'root' must exist in your logs.</p>
                      </div>
                    </div>

                    {/* Panel 4: Quality Check */}
                    <div className="glass-panel p-6 md:p-8 rounded-3xl border border-slate-700 relative overflow-hidden group">
                      <div className="absolute top-0 right-0 w-24 h-24 bg-yellow-500/10 rounded-full blur-2xl group-hover:bg-yellow-500/20 transition-colors"></div>
                      <h4 className="font-extrabold text-white text-xl mb-4 relative z-10 flex items-center">
                        <i className="fas fa-triangle-exclamation text-yellow-400 mr-3 text-2xl"></i>Panel 4: Data Quality Check
                      </h4>
                      <div className="relative z-10"><CodeBlock code={`index=lab_data\n| stats count by sourcetype, source\n| sort - count`} /></div>
                      <div className="text-base text-slate-400 mt-4 leading-relaxed relative z-10 bg-slate-900/40 p-4 rounded-xl space-y-2">
                        <p><strong>What to expect:</strong> A pie chart or table showing your sourcetypes (<code>sshd</code>, <code>vsftpd</code>). If a sourcetype is missing, your logs are not being ingested correctly.</p>
                        <p className="text-sm italic border-t border-slate-800 pt-2 text-slate-500">Requirement: Data must be arriving via Syslog (UDP/514) for this to populate.</p>
                      </div>
                    </div>
                  </div>

                  <SubHeader title="How to build the dashboard in Splunk" />
                  <div className="glass-panel p-8 rounded-3xl border border-slate-700 mb-10">
                    <ol className="list-decimal pl-6 space-y-4 text-slate-300 text-lg font-medium leading-relaxed">
                      <li>Run the search in <strong>Search & Reporting</strong> and confirm it returns the data you expect.</li>
                      <li>Click <strong>Save As &gt; Dashboard Panel</strong>.</li>
                      <li>Create a new dashboard titled <code className="text-blue-300 italic">SOC Attack Overview</code>.</li>
                      <li>Choose the visualization type: <strong>Line Chart</strong> for trends, <strong>Bar Chart</strong> for users, or <strong>Single Value</strong> for root targeting.</li>
                      <li>Give the panel a clear title (e.g., "Active Brute Force Attempts").</li>
                      <li>Change the time range to <strong>"Last 60 Minutes"</strong> and confirm the data updates correctly.</li>
                    </ol>
                  </div>

                  <SubHeader title="Dashboard troubleshooting" />
                  <div className="space-y-4 mb-10">
                    <Accordion title="My dashboard panel is empty" icon="fas fa-chart-column" defaultOpen={false}>
                      <ul className="list-disc pl-6 space-y-3 text-lg leading-relaxed text-slate-300">
                        <li><strong>Check the Index:</strong> Verify you are definitely searching <code>index=lab_data</code>. If you used a different index, update the SPL.</li>
                        <li><strong>Check the Time Picker:</strong> Historical lab data often defaults to a window where no logs exist. Try <strong>"All Time"</strong> to verify data presence.</li>
                        <li><strong>Inline Regex vs Persistent:</strong> If Option A is empty, use Option B. If both are empty, your extraction logic (the <code>rex</code> command) is not matching the text in your raw logs.</li>
                        <li><strong>Permissions:</strong> If you saved your extraction as <strong>Private</strong> in Tab 7, the dashboard system may not be able to "see" those fields.</li>
                      </ul>
                    </Accordion>

                    <Accordion title="The charts look confusing or blank" icon="fas fa-eye">
                      <ul className="list-disc pl-6 space-y-3 text-lg leading-relaxed text-slate-300">
                        <li><strong>Visualization Type:</strong> A <code>timechart</code> command <em>must</em> be viewed as a chart (Line/Area), not a list of text.</li>
                        <li><strong>Reduce Noise:</strong> Use the <code className="font-code text-blue-300 bg-blue-900/30 px-1 rounded">head 10</code> command to prevent one chart from showing 50 different usernames at once.</li>
                        <li><strong>Data Volume:</strong> If the Kali attack is too slow (using <code>-t 1</code>), the spikes in your <code>timechart</code> may be too small to notice. Increase attack speed to see clear results.</li>
                      </ul>
                    </Accordion>
                  </div>

                  <SubHeader title="Final beginner reminders" />
                  <div className="grid md:grid-cols-2 gap-6 mb-12">
                    <InfoCard icon="fas fa-seedling" title="Start simple" tone="green">
                      A good analyst does not begin with the fanciest query. They confirm the raw logs exist (<code>index=lab_data</code>) before applying filters.
                    </InfoCard>
                    <InfoCard icon="fas fa-magnifying-glass-chart" title="Inspect before assuming" tone="blue">
                      If a field is blank, expand the raw event. Check if the text matches your regex (e.g., is it "from" or "rhost="?).
                    </InfoCard>
                    <InfoCard icon="fas fa-clock-rotate-left" title="Remember the time picker" tone="yellow">
                      Empty results are 90% of the time caused by the wrong time range. Ensure the Splunk clock matches your lab VM's clock.
                    </InfoCard>
                    <InfoCard icon="fas fa-pen-to-square" title="Document your findings" tone="purple">
                      A dashboard is a report. Label your panels clearly so a manager can understand the threat without reading your SPL code.
                    </InfoCard>
                  </div>

                  <Quiz
                    question="What is the safest way to ensure a dashboard panel will display data?"
                    options={[
                      'Build the dashboard first and test later',
                      'Make sure the search returns results in the Statistics tab of Search & Reporting first',
                      'Use only the default fields provided by Splunk',
                      'Never use the rex command in a dashboard'
                    ]}
                    answerIndex={1}
                    explanation="You must validate that your SPL works in the Search app first. If the Statistics tab there is empty, your dashboard panel will also be empty."
                  />
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
